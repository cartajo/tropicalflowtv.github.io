<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tropical Flow Radio Tv - Mixing Studio</title>
<meta name="description" content="Pro Core Audio Engine, Advanced FX Sampler & Dual Wave Live Analyzer.">

<style>
  :root {
    --bg-app: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?fit=crop&w=1920&q=80');
    --bg-panel: rgba(11, 15, 25, 0.92);
    --bg-subpanel: #070a12;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff007f;
    --neon-green: #39ff14;
    --neon-red: #ff3333;
    --gold: #f59e0b;
    --text-main: #f8fafc;
    --text-dim: #64748b;
    --border-glow: rgba(255, 255, 255, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-image: var(--bg-app);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    color: var(--text-main);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .top-bar {
    width: 100%; max-width: 1400px; display: flex; justify-content: space-between;
    align-items: center; background: var(--bg-panel); padding: 10px 20px;
    border-radius: 8px; border: 1px solid var(--border-glow); margin-bottom: 15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  
  .top-bar h1 {
    font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
    color: #94a3b8;
  }
  
  .nav-btn { 
    background: #131a2a; border: 1px solid #23314f; color: #fff; 
    padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; 
    font-weight: 700; cursor: pointer; text-transform: uppercase; 
  }

  .tropical-brand-center {
    text-align: center;
    margin: 10px 0 25px 0;
    padding: 15px;
    width: 100%;
    max-width: 600px;
  }
  
  .tropical-brand-center h2 {
    font-size: 2.8rem;
    font-weight: 950;
    text-transform: uppercase;
    letter-spacing: 5px;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--neon-cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(0, 240, 255, 0.6)) drop-shadow(0 4px 20px rgba(245, 158, 11, 0.4));
  }
  
  .tropical-brand-center p {
    color: var(--neon-green);
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }

  .studio-container { width: 100%; max-width: 1400px; display: flex; flex-direction: column; gap: 15px; }
  .mixer-interface { display: grid; grid-template-columns: 1fr 340px 1fr; gap: 15px; }

  @media (max-width: 1100px) {
    .mixer-interface { grid-template-columns: 1fr; }
    .center-rack { order: 3; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <button class="nav-btn">☰ Menu</button>
  <h1>Live Broadcast Studio</h1>
  <button class="nav-btn">ON AIR •</button>
</div>

<div class="tropical-brand-center">
  <h2>TROPICAL flow<br><span style="font-size: 2rem; background: linear-gradient(90deg, var(--neon-magenta), var(--gold)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Radio Tv</span></h2>
  <p>La evolución del Caribe</p>
</div>
<style>
  /* ==========================================================================
     ESTILOS DE LOS PLATOS (DECKS) EXTENDIDOS
     ========================================================================== */
  .dj-deck {
    background: var(--bg-panel); border-radius: 12px; padding: 15px;
    border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column;
    position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
  }
  .deck-a { border-top: 3px solid var(--neon-cyan); }
  .deck-b { border-top: 3px solid var(--neon-magenta); }

  .deck-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; width: 100%; }
  .deck-info-meta { display: flex; flex-direction: column; gap: 2px; }
  .deck-badge { font-size: 0.7rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: #000; width: max-content; }
  .deck-a .deck-badge { color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.2); }
  .deck-b .deck-badge { color: var(--neon-magenta); border: 1px solid rgba(255,0,127,0.2); }
  
  .track-title { font-size: 0.9rem; color: #fff; font-weight: 700; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
  .bpm-counter { text-align: right; }
  .bpm-label { font-size: 0.55rem; color: var(--text-dim); font-weight: 800; }
  .bpm-value { font-family: monospace; font-size: 1.1rem; font-weight: 900; color: var(--neon-green); }

  /* DISPLAY CONTADORES */
  .display-panel {
    width: 100%; background: #04060a; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);
    padding: 8px 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
  }
  .time-group { display: flex; flex-direction: column; }
  .time-label { font-size: 0.55rem; color: var(--text-dim); font-weight: 800; letter-spacing: 0.5px; }
  .time-counter { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--neon-green); }
  .time-counter.countdown { color: var(--neon-red); }

  .wave-display { width: 100%; height: 45px; background: #000; border-radius: 4px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.02); }

  /* FILA DE CONTROLES CUE / LOOP / SYNC */
  .performance-row { width: 100%; display: flex; gap: 4px; margin-bottom: 10px; justify-content: space-between; align-items: center; }
  .perf-label { font-size: 0.55rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; white-space: nowrap; }
  .perf-grid { display: flex; gap: 4px; flex-grow: 1; justify-content: flex-end; }
  .pad-btn { padding: 4px 8px; background: #131a2a; border: 1px solid #23314f; color: #94a3b8; font-size: 0.65rem; font-weight: 700; border-radius: 3px; cursor: pointer; text-transform: uppercase; min-width: 32px; text-align: center; }
  .pad-btn:hover { background: #1e2942; color: #fff; }
  .pad-btn.active-mode { background: #1e2942; color: var(--neon-cyan); border-color: var(--neon-cyan); }
  .pad-btn.sync-mode { color: var(--neon-magenta); border-color: var(--neon-magenta); }

  .deck-a input[type="range"].vertical-slider { accent-color: var(--neon-cyan); }
  .deck-b input[type="range"].vertical-slider { accent-color: var(--neon-magenta); }

  /* JOG WHEEL PROFESIONAL */
  .jog-wheel { width: 135px; height: 135px; border-radius: 50%; background: radial-gradient(circle, #1a2233 12%, #07090e 13%, #07090e 35%, #111622 36%, #020305 70%); border: 4px solid #1f293d; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }

  .deck-b .jog-center { box-shadow: 0 0 15px rgba(255,0,127,0.4); border-color: var(--neon-magenta); }

  .file-label { display: block; text-align: center; padding: 6px; background: #131a2a; border: 1px dashed #23314f; border-radius: 4px; font-size: 0.65rem; cursor: pointer; color: #94a3b8; font-weight: bold; }

  .knob-unit { display: flex; flex-direction: column; width: 100%; gap: 2px; }

  input[type="range"].h-slider-raw { width: 100%; height: 5px; background: #000; border-radius: 3px; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; accent-color: var(--gold); }

  .vumeter-fill { width: 100%; height: 0%; background: linear-gradient(to top, var(--neon-green) 60%, var(--gold) 85%, var(--neon-red) 100%); }
</style>

<!-- Elementos de audio nativos en segundo plano -->
<audio id="audioA" loop crossorigin="anonymous"></audio>
<audio id="audioB" loop crossorigin="anonymous"></audio>

<script>
  const audA = document.getElementById('audioA');
  const audB = document.getElementById('audioB');
  
  let audioCtx = null;
  let srcA, srcB, gainA, gainB, crossGainA, crossGainB;
  let filterHi, filterMid, filterLow;
  let analyserA, analyserB;
  let engineReady = false;

  // Inicialización y Configuración de Nodos de Audio Profesional
  async function initAudioEngine() {
    if (engineReady) {
      if (audioCtx && audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }
      return;
    }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      srcA = audioCtx.createMediaElementSource(audA);
      srcB = audioCtx.createMediaElementSource(audB);
      
      gainA = audioCtx.createGain(); 
      gainB = audioCtx.createGain();
      crossGainA = audioCtx.createGain(); 
      crossGainB = audioCtx.createGain();
      
      analyserA = audioCtx.createAnalyser(); analyserA.fftSize = 64;
      analyserB = audioCtx.createAnalyser(); analyserB.fftSize = 64;
      
      // Ecualización global del Master para simplificar el flujo sin colapsar canales
      filterHi = audioCtx.createBiquadFilter();  filterHi.type = "highshelf";  filterHi.frequency.value = 4000;
      filterMid = audioCtx.createBiquadFilter(); filterMid.type = "peaking";    filterMid.frequency.value = 1200; filterMid.Q.value = 1.0;
      filterLow = audioCtx.createBiquadFilter(); filterLow.type = "lowshelf";   filterLow.frequency.value = 250;

      // Un nodo sumador maestro para recibir la mezcla antes de los filtros
      const masterMixer = audioCtx.createGain();

      // Enrutamiento modular limpio e independiente por canal hacia el mezclador maestro
      srcA.connect(gainA).connect(crossGainA).connect(analyserA).connect(masterMixer);
      srcB.connect(gainB).connect(crossGainB).connect(analyserB).connect(masterMixer);
      
      // Del mezclador maestro pasa a la cadena de ecualización y finalmente a las bocinas
      masterMixer.connect(filterLow);
      filterLow.connect(filterMid).connect(filterHi).connect(audioCtx.destination);
      
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }

      engineReady = true;
      console.log("Motor de audio Tropical Flow activado con éxito.");
      renderWavesAndVus();
    } catch(e) { 
      console.error("Hardware de audio esperando interacción inicial o error:", e); 
    }
  }
  // Carga e Inyección de Archivos con Índices Seguros Corregidos
  document.getElementById('fileA').addEventListener('change', function(e) {
    if (this.files.length > 0) {
      document.getElementById('titleA').innerText = this.files[0].name;
      document.getElementById('labelFileA').innerText = "Cambiar track A";
      audA.src = URL.createObjectURL(this.files[0]);
      audA.load();
    }
  });

  document.getElementById('fileB').addEventListener('change', function(e) {
    if (this.files.length > 0) {
      document.getElementById('titleB').innerText = this.files[0].name;
      document.getElementById('labelFileB').innerText = "Cambiar track B";
      audB.src = URL.createObjectURL(this.files[0]);
      audB.load();
    }
  });

  // Disparadores de los Decks con Desbloqueo de Audio Sincronizado
  document.getElementById('playA').addEventListener('click', async () => {
    await initAudioEngine(); 
    if (audioCtx && audioCtx.state === 'suspended') { await audioCtx.resume(); }
    audA.play().then(() => { 
      document.getElementById('wheelA').classList.add('spinning'); 
      updateMixerMixes(); 
    }).catch(() => alert("Selecciona una canción para el DECK A"));
  });
  document.getElementById('cueA').addEventListener('click', () => { audA.pause(); document.getElementById('wheelA').classList.remove('spinning'); });

  document.getElementById('playB').addEventListener('click', async () => {
    await initAudioEngine(); 
    if (audioCtx && audioCtx.state === 'suspended') { await audioCtx.resume(); }
    audB.play().then(() => { 
      document.getElementById('wheelB').classList.add('spinning'); 
      updateMixerMixes(); 
    }).catch(() => alert("Selecciona una canción para el DECK B"));
  });
  document.getElementById('cueB').addEventListener('click', () => { audB.pause(); document.getElementById('wheelB').classList.remove('spinning'); });

  // Controladores de Faders y Ganancias del Mezclador
  function updateMixerMixes() {
    if (!engineReady || !gainA || !gainB || !crossGainA || !crossGainB) return;
    gainA.gain.value = parseFloat(document.getElementById('volA').value);
    gainB.gain.value = parseFloat(document.getElementById('volB').value);
    const crossVal = parseFloat(document.getElementById('crossfader').value);
    if (crossVal <= 0) { 
      crossGainA.gain.value = 1; 
      crossGainB.gain.value = 1 + crossVal; 
    } else { 
      crossGainA.gain.value = 1 - crossVal; 
      crossGainB.gain.value = 1; 
    }
  }

  document.getElementById('volA').addEventListener('input', (e) => { document.getElementById('txtVolA').innerText = Math.round(e.target.value * 100) + "%"; updateMixerMixes(); });
  document.getElementById('volB').addEventListener('input', (e) => { document.getElementById('txtVolB').innerText = Math.round(e.target.value * 100) + "%"; updateMixerMixes(); });
  document.getElementById('crossfader').addEventListener('input', updateMixerMixes);
  document.getElementById('volFX').addEventListener('input', (e) => { document.getElementById('txtVolFX').innerText = "VOL: " + Math.round(e.target.value * 100) + "%"; });

  // Pitch y Modulación del Tempo (Velocidad)
  document.getElementById('pitchA').addEventListener('input', (e) => {
    const percent = parseFloat(e.target.value);
    document.getElementById('txtPitchA').innerText = (percent >= 0 ? "+" : "") + percent.toFixed(1) + "%";
    audA.playbackRate = 1 + (percent / 100);
  });
  document.getElementById('pitchB').addEventListener('input', (e) => {
    const percent = parseFloat(e.target.value);
    document.getElementById('txtPitchB').innerText = (percent >= 0 ? "+" : "") + percent.toFixed(1) + "%";
    audB.playbackRate = 1 + (percent / 100);
  });

  // Perillas Ecualizadoras de Frecuencia
  document.getElementById('eqHi').addEventListener('input', (e) => { if (engineReady && filterHi) filterHi.gain.value = e.target.value; });
  document.getElementById('eqMid').addEventListener('input', (e) => { if (engineReady && filterMid) filterMid.gain.value = e.target.value; });
  document.getElementById('eqLow').addEventListener('input', (e) => { if (engineReady && filterLow) filterLow.gain.value = e.target.value; });

  // Sistema de Doble Reloj Sincronizado (Corregida la sintaxis de comillas de plantilla)
  function updateCounters() {
    const formatTime = (secs) => {
      if (isNaN(secs) || secs < 0) return "00:00";
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(Math.floor(secs % 60)).padStart(2, '0');
      return `${m}:${s}`;
    };
    document.getElementById('timeA').innerText = formatTime(audA.currentTime);
    document.getElementById('remainA').innerText = "-" + formatTime(audA.duration - audA.currentTime);
    document.getElementById('timeB').innerText = formatTime(audB.currentTime);
    document.getElementById('remainB').innerText = "-" + formatTime(audB.duration - audB.currentTime);
    requestAnimationFrame(updateCounters);
  }
  requestAnimationFrame(updateCounters);

  // Renderizador de Ondas Canvas y Animación de VuMeters LED en Tiempo Real
  function renderWavesAndVus() {
    const canvasA = document.getElementById('canvasA'), ctxA = canvasA.getContext('2d');
    const canvasB = document.getElementById('canvasB'), ctxB = canvasB.getContext('2d');
    const bufferLengthA = analyserA.frequencyBinCount, dataArrayA = new Uint8Array(bufferLengthA);
    const bufferLengthB = analyserB.frequencyBinCount, dataArrayB = new Uint8Array(bufferLengthB);

    function draw() {
      requestAnimationFrame(draw);
      if (!engineReady) return;
      analyserA.getByteFrequencyData(dataArrayA);
      analyserB.getByteFrequencyData(dataArrayB);
// [Continuación de la función renderWavesAndVus]
    function draw() {
      requestAnimationFrame(draw);
      if (!engineReady) return;
      
      analyserA.getByteFrequencyData(dataArrayA);
      analyserB.getByteFrequencyData(dataArrayB);

      // Dibujo Ondas Deck A (Corregido con plantillas de texto válidas)
      ctxA.fillStyle = '#000'; 
      ctxA.fillRect(0, 0, canvasA.width, canvasA.height);
      let barWidth = (canvasA.width / bufferLengthA) * 1.5, barHeight, x = 0;
      let totalVolA = 0;
      for (let i = 0; i < bufferLengthA; i++) {
        barHeight = dataArrayA[i] / 4; 
        totalVolA += dataArrayA[i];
        ctxA.fillStyle = `hsl(185, 100%, ${Math.min(barHeight + 30, 70)}%)`;
        ctxA.fillRect(x, canvasA.height - barHeight, barWidth - 1, barHeight); 
        x += barWidth;
      }

      // Dibujo Ondas Deck B (Corregido con plantillas de texto válidas)
      ctxB.fillStyle = '#000'; 
      ctxB.fillRect(0, 0, canvasB.width, canvasB.height);
      x = 0; 
      let totalVolB = 0;
      for (let i = 0; i < bufferLengthB; i++) {
        barHeight = dataArrayB[i] / 4; 
        totalVolB += dataArrayB[i];
        ctxB.fillStyle = `hsl(330, 100%, ${Math.min(barHeight + 30, 70)}%)`;
        ctxB.fillRect(x, canvasB.height - barHeight, barWidth - 1, barHeight); 
        x += barWidth;
      }

      // Automatización Física de Altura VuMeters LED
      if (engineReady && crossGainA && gainA && crossGainB && gainB) {
        let avgA = (totalVolA / bufferLengthA) * (crossGainA.gain.value * gainA.gain.value);
        let avgB = (totalVolB / bufferLengthB) * (crossGainB.gain.value * gainB.gain.value);
        let pctA = Math.min((avgA / 180) * 100, 100);
        let pctB = Math.min((avgB / 180) * 100, 100);
        document.getElementById('vuLeft').style.height = pctA + '%';
        document.getElementById('vuRight').style.height = pctB + '%';
      }
    }
    draw();
  }

  // Modulador Completo Sampler FX Expandido Línea por Línea
  function playFX(type) {
    initAudioEngine(); 
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }

    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    if (engineReady && filterLow) { osc.connect(gainNode).connect(filterLow); } 
    else { osc.connect(gainNode).connect(audioCtx.destination); }
    
    const now = audioCtx.currentTime;
    const userFXVolume = parseFloat(document.getElementById('volFX').value);
    gainNode.gain.setValueAtTime(0.01 * userFXVolume, now);

    if (type === 'bocina') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(420, now); 
      gainNode.gain.linearRampToValueAtTime(0.35 * userFXVolume, now + 0.02);
      for(let i = 0; i < 0.7; i += 0.12) { 
        osc.frequency.setValueAtTime(390, now + i); 
        osc.frequency.setValueAtTime(440, now + i + 0.04); 
      }
      gainNode.gain.setValueAtTime(0.35 * userFXVolume, now + 0.7); 
      gainNode.gain.linearRampToValueAtTime(0.01 * userFXVolume, now + 0.9); 
      osc.start(now); osc.stop(now + 0.9);
    } 
    else if (type === 'scratch') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(140, now); 
      gainNode.gain.linearRampToValueAtTime(0.45 * userFXVolume, now + 0.02);
      osc.frequency.linearRampToValueAtTime(900, now + 0.08); 
      osc.frequency.linearRampToValueAtTime(180, now + 0.16); 
      osc.frequency.linearRampToValueAtTime(700, now + 0.24);
      gainNode.gain.setValueAtTime(0.45 * userFXVolume, now + 0.24); 
      gainNode.gain.linearRampToValueAtTime(0.01 * userFXVolume, now + 0.32); 
      osc.start(now); osc.stop(now + 0.32);
    } 
    else if (type === 'laser') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(2200, now); 
      gainNode.gain.linearRampToValueAtTime(0.25 * userFXVolume, now + 0.02);
      osc.frequency.linearRampToValueAtTime(60, now + 0.45); 
      gainNode.gain.linearRampToValueAtTime(0.01 * userFXVolume, now + 0.45); 
      osc.start(now); osc.stop(now + 0.45);
    } 
    else if (type === 'sirena') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(550, now); 
      osc.frequency.linearRampToValueAtTime(950, now + 0.2); 
      osc.frequency.linearRampToValueAtTime(550, now + 0.4); 
      osc.frequency.linearRampToValueAtTime(950, now + 0.6);
      gainNode.gain.setValueAtTime(0.25 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.9); 
      osc.start(now); osc.stop(now + 0.9);
    }
    else if (type === 'corte') {
      if(audA.playbackRate > 0 && !audA.paused) {
        let r = audA.playbackRate; 
        const iv = setInterval(() => { r -= 0.1; if(r <= 0.1){ clearInterval(iv); audA.pause(); audA.playbackRate = 1; document.getElementById('wheelA').classList.remove('spinning'); } else { audA.playbackRate = r; } }, 40);
      }
      if(audB.playbackRate > 0 && !audB.paused) {
        let r = audB.playbackRate; 
        const iv = setInterval(() => { r -= 0.1; if(r <= 0.1){ clearInterval(iv); audB.pause(); audB.playbackRate = 1; document.getElementById('wheelB').classList.remove('spinning'); } else { audB.playbackRate = r; } }, 40);
      }
    }
    else if (type === 'explosion') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); 
      osc.frequency.linearRampToValueAtTime(20, now + 1.2);
      gainNode.gain.setValueAtTime(0.55 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.2); 
      osc.start(now); osc.stop(now + 1.2);
    }
    else if (type === 'aplauso') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(280, now); 
      gainNode.gain.setValueAtTime(0.3 * userFXVolume, now);
      for(let i = 0; i < 0.5; i += 0.05) { 
        gainNode.gain.setValueAtTime(0.3 * userFXVolume, now + i); 
        gainNode.gain.setValueAtTime(0.01 * userFXVolume, now + i + 0.02); 
      }
      osc.start(now); osc.stop(now + 0.5);
    }
    else if (type === 'campana') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); 
      osc.frequency.setValueAtTime(1200, now);
      gainNode.gain.setValueAtTime(0.35 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4); 
      osc.start(now); osc.stop(now + 0.4);
    }
    else if (type === 'dembow') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(150, now); 
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
      gainNode.gain.setValueAtTime(0.65 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15); 
      osc.start(now); osc.stop(now + 0.15);
    }
    else if (type === 'subbass') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(90, now); 
      osc.frequency.linearRampToValueAtTime(25, now + 1.5);
      gainNode.gain.setValueAtTime(0.6 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5); 
      osc.start(now); osc.stop(now + 1.5);
    }
  }

  // Escuchadores del panel Sampler FX 10-Pads
  document.getElementById('fxBocina').addEventListener('click', () => playFX('bocina'));
  document.getElementById('fxScratch').addEventListener('click', () => playFX('scratch'));
  document.getElementById('fxLaser').addEventListener('click', () => playFX('laser'));
  document.getElementById('fxSirena').addEventListener('click', () => playFX('sirena'));
  document.getElementById('fxCorte').addEventListener('click', () => playFX('corte'));
  document.getElementById('fxExplosion').addEventListener('click', () => playFX('explosion'));
  document.getElementById('fxAplauso').addEventListener('click', () => playFX('aplauso'));
  document.getElementById('fxCampana').addEventListener('click', () => playFX('campana'));
  document.getElementById('fxDembow').addEventListener('click', () => playFX('dembow'));
  document.getElementById('fxSubBass').addEventListener('click', () => playFX('subbass'));
</script>
</body>
