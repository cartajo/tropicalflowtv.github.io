<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tropical Flow Radio Tv - Mixing Studio</title>
<meta name="description" content="Pro Core Audio Engine, Advanced FX Sampler & Dual Wave Live Analyzer.">

<style>
 :root {
  --bg-app: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?fit=crop&w=1920&q=80');

  --bg-panel: rgba(11, 15, 25, 0.92);
  --bg-subpanel: #070a12;
  --neon-cyan: #00f0ff;
  --neon-magenta: #ff007f;
  --neon-green: #39ff14;
  --neon-red: #ff3333;
  --gold: #f59e0b;
  --text-main: #f8fafc;
  --text-dim: #64748b;
  --border-glow: rgba(255, 255, 255, 0.08);
}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-image: var(--bg-app);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    color: var(--text-main);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .top-bar {
    width: 100%; max-width: 1400px; display: flex; justify-content: space-between;
    align-items: center; background: var(--bg-panel); padding: 10px 20px;
    border-radius: 8px; border: 1px solid var(--border-glow); margin-bottom: 15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  
  .top-bar h1 {
    font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
    color: #94a3b8;
  }
  
  .nav-btn { 
    background: #131a2a; border: 1px solid #23314f; color: #fff; 
    padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; 
    font-weight: 700; cursor: pointer; text-transform: uppercase; 
  }

  .tropical-brand-center {
    text-align: center;
    margin: 10px 0 25px 0;
    padding: 15px;
    width: 100%;
    max-width: 600px;
  }
  
  .tropical-brand-center h2 {
    font-size: 2.8rem;
    font-weight: 950;
    text-transform: uppercase;
    letter-spacing: 5px;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--neon-cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(0, 240, 255, 0.6)) drop-shadow(0 4px 20px rgba(245, 158, 11, 0.4));
  }
  
  .tropical-brand-center p {
    color: var(--neon-green);
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }

  <div class="studio-container">
  <div class="mixer-interface">
    
    <!-- DECK A (COLUMNA IZQUIERDA) -->
    <div class="dj-deck deck-a">
      <div class="deck-header">
        <div class="deck-info-meta">
          <span class="deck-badge">DECK A</span>
          <div class="track-title" id="titleA">Ningún track cargado</div>
        </div>
        <div class="bpm-counter">
          <div class="bpm-label">BPM</div>
          <div class="bpm-value" id="bpmValA">92.50</div>
        </div>
      </div>
      
      <div class="display-panel">
        <div class="time-group">
          <span class="time-label">ELAPSED</span>
          <div class="time-counter" id="timeA">00:00</div>
        </div>
        <div class="time-group" style="text-align: right;">
          <span class="time-label" style="color:var(--neon-red)">REMAINING</span>
          <div class="time-counter countdown" id="remainA">-00:00</div>
        </div>
      </div>

      <canvas class="wave-display" id="canvasA"></canvas>

      <div class="performance-row">
        <span class="perf-label">Hot Cue</span>
        <div class="perf-grid">
          <button class="pad-btn">1</button>
          <button class="pad-btn">2</button>
          <button class="pad-btn">3</button>
          <button class="pad-btn">4</button>
        </div>
       loopA
  // Modulador Completo Sampler FX de 10 Botones
  function playFX(type) {
    initAudioEngine(); 
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }

    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    if (engineReady && filterLow) { osc.connect(gainNode).connect(filterLow); } 
    else { osc.connect(gainNode).connect(audioCtx.destination); }
    
    const now = audioCtx.currentTime;
    const userFXVolume = parseFloat(document.getElementById('volFX').value);
    gainNode.gain.setValueAtTime(0.01 * userFXVolume, now);

    if (type === 'bocina') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(420, now); 
      gainNode.gain.linearRampToValueAtTime(0.35 * userFXVolume, now + 0.02);
      for(let i = 0; i < 0.7; i += 0.12) { 
        osc.frequency.setValueAtTime(390, now + i); 
        osc.frequency.setValueAtTime(440, now + i + 0.04); 
      }
      gainNode.gain.setValueAtTime(0.35 * userFXVolume, now + 0.7); 
      gainNode.gain.linearRampToValueAtTime(0.01 * userFXVolume, now + 0.9); 
      osc.start(now); osc.stop(now + 0.9);
    } 
    else if (type === 'scratch') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(140, now); 
      gainNode.gain.linearRampToValueAtTime(0.45 * userFXVolume, now + 0.02);
      osc.frequency.linearRampToValueAtTime(900, now + 0.08); 
      osc.frequency.linearRampToValueAtTime(180, now + 0.16); 
      osc.frequency.linearRampToValueAtTime(700, now + 0.24);
      gainNode.gain.setValueAtTime(0.45 * userFXVolume, now + 0.24); 
      gainNode.gain.linearRampToValueAtTime(0.01 * userFXVolume, now + 0.32); 
      osc.start(now); osc.stop(now + 0.32);
    } 
    else if (type === 'laser') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(2200, now); 
      gainNode.gain.linearRampToValueAtTime(0.25 * userFXVolume, now + 0.02);
      osc.frequency.linearRampToValueAtTime(60, now + 0.45); 
      gainNode.gain.linearRampToValueAtTime(0.01 * userFXVolume, now + 0.45); 
      osc.start(now); osc.stop(now + 0.45);
    } 
    else if (type === 'sirena') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(550, now); 
      osc.frequency.linearRampToValueAtTime(950, now + 0.2); 
      osc.frequency.linearRampToValueAtTime(550, now + 0.4); 
      osc.frequency.linearRampToValueAtTime(950, now + 0.6);
      gainNode.gain.setValueAtTime(0.25 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.9); 
      osc.start(now); osc.stop(now + 0.9);
    }
    else if (type === 'corte') {
      if(audA.playbackRate > 0 && !audA.paused) {
        let r = audA.playbackRate; 
        const iv = setInterval(() => { r -= 0.1; if(r <= 0.1){ clearInterval(iv); audA.pause(); audA.playbackRate = 1; document.getElementById('wheelA').classList.remove('spinning'); } else { audA.playbackRate = r; } }, 40);
      }
      if(audB.playbackRate > 0 && !audB.paused) {
        let r = audB.playbackRate; 
        const iv = setInterval(() => { r -= 0.1; if(r <= 0.1){ clearInterval(iv); audB.pause(); audB.playbackRate = 1; document.getElementById('wheelB').classList.remove('spinning'); } else { audB.playbackRate = r; } }, 40);
      }
    }
    else if (type === 'explosion') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); 
      osc.frequency.linearRampToValueAtTime(20, now + 1.2);
      gainNode.gain.setValueAtTime(0.55 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.2); 
      osc.start(now); osc.stop(now + 1.2);
    }
    else if (type === 'aplauso') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(280, now); 
      gainNode.gain.setValueAtTime(0.3 * userFXVolume, now);
      for(let i = 0; i < 0.5; i += 0.05) { 
        gainNode.gain.setValueAtTime(0.3 * userFXVolume, now + i); 
        gainNode.gain.setValueAtTime(0.01 * userFXVolume, now + i + 0.02); 
      }
      osc.start(now); osc.stop(now + 0.5);
    }
    else if (type === 'campana') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); 
      osc.frequency.setValueAtTime(1200, now);
      gainNode.gain.setValueAtTime(0.35 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4); 
      osc.start(now); osc.stop(now + 0.4);
    }
    else if (type === 'dembow') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(150, now); 
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
      gainNode.gain.setValueAtTime(0.65 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15); 
      osc.start(now); osc.stop(now + 0.15);
    }
    else if (type === 'subbass') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(90, now); 
      osc.frequency.linearRampToValueAtTime(25, now + 1.5);
      gainNode.gain.setValueAtTime(0.6 * userFXVolume, now); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5); 
      osc.start(now); osc.stop(now + 1.5);
    }
  }

  // Escuchadores del panel Sampler FX 10-Pads
  document.getElementById('fxBocina').addEventListener('click', () => playFX('bocina'));
  document.getElementById('fxScratch').addEventListener('click', () => playFX('scratch'));
  document.getElementById('fxLaser').addEventListener('click', () => playFX('laser'));
  document.getElementById('fxSirena').addEventListener('click', () => playFX('sirena'));
  document.getElementById('fxCorte').addEventListener('click', () => playFX('corte'));
  document.getElementById('fxExplosion').addEventListener('click', () => playFX('explosion'));
  document.getElementById('fxAplauso').addEventListener('click', () => playFX('aplauso'));
  document.getElementById('fxCampana').addEventListener('click', () => playFX('campana'));
  document.getElementById('fxDembow').addEventListener('click', () => playFX('dembow'));
  document.getElementById('fxSubBass').addEventListener('click', () => playFX('subbass'));
</script>
</body>
</html>
