<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ultra Pro DJ Mixing Studio</title>
<style>
  :root {
    --bg-main: #060709;
    --panel-bg: #101216;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff007f;
    --neon-green: #39ff14;
    --text-main: #f1f5f9;
    --text-dim: #475569;
    --gold: #eab308;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 1200px; }
  header h1 {
    font-size: 2.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; letter-spacing: 1px; }

  .studio-container {
    width: 100%; max-width: 1200px; background: var(--panel-bg); border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.03); box-shadow: 0 25px 60px #000; padding: 20px;
  }

  /* Grid Principal de la Interfaz */
  .mixer-interface { display: grid; grid-template-columns: 1fr 280px 1fr; gap: 20px; }
  @media (max-width: 950px) { .mixer-interface { grid-template-columns: 1fr; } .center-rack { order: 3; } }
</style>
<style>
  /* ─── ESTILOS DE LOS DECKS ─── */
  .dj-deck {
    background: #15181f; border-radius: 16px; padding: 18px; border: 1px solid rgba(255,255,255,0.02);
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  .deck-a { border-bottom: 4px solid var(--neon-cyan); }
  .deck-b { border-bottom: 4px solid var(--neon-magenta); }
  .deck-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .deck-badge { font-size: 0.75rem; font-weight: 900; padding: 3px 8px; border-radius: 5px; background: #000; }
  .deck-a .deck-badge { color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.2); }
  .deck-b .deck-badge { color: var(--neon-magenta); border: 1px solid rgba(255,0,127,0.2); }
  .track-title { font-size: 0.8rem; color: var(--text-main); font-weight: 600; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  /* PANTALLAS DIGITALES Y CONTADORES */
  .display-panel {
    width: 100%; background: #090a0d; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
    padding: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .time-counter { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--neon-green); text-shadow: 0 0 10px rgba(57,255,20,0.3); }
  .wave-display { width: 100%; height: 50px; background: #000; border-radius: 6px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.02); display: block; }

  /* CARGADOR DE ARCHIVOS Y JOG WHEEL */
  .file-uploader { width: 100%; margin-bottom: 12px; }
  .file-uploader input[type="file"] { display: none; }
  .file-label { display: block; text-align: center; padding: 8px; background: #1e222b; border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px; font-size: 0.75rem; cursor: pointer; color: var(--text-dim); }
  .file-label:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
  .jog-wheel { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, #232733 12%, #0b0d10 13%, #0b0d10 35%, #13161c 36%, #030405 70%); border: 5px solid #222630; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
  .jog-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 50%; border: 2px solid #000; background: #101216; }
  .deck-a .jog-center { box-shadow: 0 0 12px rgba(0,240,255,0.3); border-color: var(--neon-cyan); }
  .deck-b .jog-center { box-shadow: 0 0 12px rgba(255,0,127,0.3); border-color: var(--neon-magenta); }
  .jog-marker { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 20px; background: #fff; border-radius: 2px; transform-origin: bottom center; }
  .spinning { animation: jogSpin 2.5s linear infinite; }
  @keyframes jogSpin { 100% { transform: rotate(360deg); } }

  /* CONTROLES E INTERFAZ DEL MEZCLADOR CENTRAL */
  .deck-controls-row { width: 100%; display: flex; gap: 8px; margin-top: 15px; }
  .action-btn { flex: 1; padding: 10px; border: 0; border-radius: 6px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; background: #1e222b; color: var(--text-main); }
  .btn-play { background: #162031; color: var(--neon-green); border: 1px solid rgba(57,255,20,0.1); }
  .btn-play:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 12px rgba(57,255,20,0.3); }
  .btn-cue { background: #162031; color: var(--gold); border: 1px solid rgba(234,179,8,0.1); }
  .btn-cue:hover { background: var(--gold); color: #000; box-shadow: 0 0 12px rgba(234,179,8,0.3); }
  .deck-sliders { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .slider-unit { display: flex; flex-direction: column; gap: 3px; width: 100%; }
  .slider-unit label { font-size: 0.7rem; color: var(--text-dim); display: flex; justify-content: space-between; font-weight: 600; text-transform: uppercase; }
  .slider-unit input[type="range"] { width: 100%; height: 5px; background: #000; border-radius: 3px; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; }
  .deck-a input[type="range"] { accent-color: var(--neon-cyan); }
  .deck-b input[type="range"] { accent-color: var(--neon-magenta); }
  .center-rack { background: #0b0d10; border-radius: 16px; padding: 15px; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255, 255, 255, 0.01); }
  .mixer-brand { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; }
  .eq-section { width: 100%; display: flex; flex-direction: column; gap: 12px; padding: 5px 0; }
  .knob-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
  .knob-unit label { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; }
  .knob-unit input[type="range"] { width: 85%; accent-color: var(--gold); cursor: pointer; }

  /* SAMPLER FX (PADS DE EFECTOS) */
  .sampler-panel { width: 100%; margin-top: 15px; padding: 10px 5px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .sampler-title { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .sampler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
  .fx-pad { padding: 10px 5px; background: #14171c; border: 1px solid rgba(255,255,255,0.03); border-radius: 6px; font-size: 0.68rem; font-weight: 800; color: #fff; cursor: pointer; text-transform: uppercase; text-align: center; transition: all 0.15s ease; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05); }
  .fx-pad:active { transform: scale(0.95); }
  .fx-pad.cyan { border-bottom: 3px solid var(--neon-cyan); }
  .fx-pad.cyan:hover { background: rgba(0, 240, 255, 0.15); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
  .fx-pad.magenta { border-bottom: 3px solid var(--neon-magenta); }
  .fx-pad.magenta:hover { background: rgba(255, 0, 127, 0.15); box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
  .crossfader-section { width: 100%; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; }
  .crossfader-section label { font-size: 0.65rem; color: var(--text-dim); font-weight: 800; letter-spacing: 1.5px; display: block; margin-bottom: 5px; text-transform: uppercase; }
  .crossfader-slider { width: 100%; height: 8px; background: #000; border-radius: 4px; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; accent-color: var(--gold); border: 1px solid rgba(255,255,255,0.05); }
  .fader-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; font-weight: 700; }
</style>
<!-- API de YouTube Iframe -->
<script src="https://youtube.com"></script>
</head>
<body>

<header>
  <h1>Ultra Pro DJ Studio</h1>
  <p>Pro Core Audio Engine & FX Analizer</p>
</header>

<div class="studio-container">
  <div class="mixer-interface">
    
    <!-- DECK A -->
    <div class="dj-deck deck-a">
      <div class="deck-header">
        <span class="deck-badge">DECK A</span>
        <div class="track-title" id="titleA">Ningún track cargado</div>
      </div>
      
      <!-- Pantalla Digital y Contador A -->
      <div class="display-panel">
        <div class="time-counter" id="timeA">00:00</div>
        <div style="font-size: 0.65rem; color: var(--text-dim); font-weight: 800;">TIME ELAPSED</div>
      </div>

      <!-- Pantalla Analizadora de Onda A -->
      <canvas class="wave-display" id="canvasA"></canvas>
      
      <div class="file-uploader">
        <label for="fileA" class="file-label" id="labelFileA">Seleccionar canción</label>
        <input type="file" id="fileA" accept="audio/*">
      </div>

      <div class="jog-wheel" id="wheelA">
        <div class="jog-center"></div>
        <div class="jog-marker" id="markA"></div>
      </div>

      <div class="deck-controls-row">
        <button class="action-btn btn-play" id="playA">▶ Play</button>
        <button class="action-btn btn-cue" id="cueA">⏸ Cue</button>
      </div>

      <div class="deck-sliders">
        <div class="slider-unit">
          <label>Volumen A <span id="txtVolA">100%</span></label>
          <input type="range" id="volA" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="slider-unit">
          <label>Pitch Tempo <span id="txtPitchA">0.0%</span></label>
          <input type="range" id="pitchA" min="-10" max="10" step="0.1" value="0">
        </div>
      </div>
    </div>

    <!-- MEZCLADOR CENTRAL -->
    <div class="center-rack">
      <div class="mixer-brand">Master Control</div>
      
      <div class="eq-section">
        <div class="knob-unit">
          <label>HI (Agudos)</label>
          <input type="range" id="eqHi" min="-24" max="12" step="1" value="0">
        </div>
        <div class="knob-unit">
          <label>MID (Medios)</label>
          <input type="range" id="eqMid" min="-24" max="12" step="1" value="0">
        </div>
        <div class="knob-unit">
          <label>LOW (Graves)</label>
          <input type="range" id="eqLow" min="-24" max="12" step="1" value="0">
        </div>
      </div>

      <!-- PANEL CENTRAL SAMPLER FX (4 PADS) -->
      <div class="sampler-panel">
        <div class="sampler-title">FX Sampler Pads</div>
        <div class="sampler-grid">
          <div class="fx-pad cyan" id="fxBocina">📣 Bocina</div>
          <div class="fx-pad cyan" id="fxScratch">💿 Scratch</div>
          <div class="fx-pad magenta" id="fxLaser">⚡ Láser</div>
          <div class="fx-pad magenta" id="fxSirena">🚨 Sirena</div>
        </div>
      </div>

      <div class="crossfader-section">
        <label>Crossfader</label>
        <input type="range" id="crossfader" class="crossfader-slider" min="-1" max="1" step="0.02" value="0">
        <div class="fader-labels">
          <span>CH A</span>
          <span>CENTER</span>
          <span>CH B</span>
        </div>
      </div>
    </div>

    <!-- DECK B -->
    <div class="dj-deck deck-b">
      <div class="deck-header">
        <span class="deck-badge">DECK B</span>
        <div class="track-title" id="titleB">Ningún track cargado</div>
      </div>
      
      <!-- Pantalla Digital y Contador B -->
      <div class="display-panel">
        <div class="time-counter" id="timeB">00:00</div>
        <div style="font-size: 0.65rem; color: var(--text-dim); font-weight: 800;">TIME ELAPSED</div>
      </div>

      <!-- Pantalla Analizadora de Onda B -->
      <canvas class="wave-display" id="canvasB"></canvas>
      
      <div class="file-uploader">
        <label for="fileB" class="file-label" id="labelFileB">Seleccionar canción</label>
        <input type="file" id="fileB" accept="audio/*">
      </div>

      <div class="jog-wheel" id="wheelB">
        <div class="jog-center"></div>
        <div class="jog-marker" id="markB"></div>
      </div>

      <div class="deck-controls-row">
        <button class="action-btn btn-play" id="playB">▶ Play</button>
        <button class="action-btn btn-cue" id="cueB">⏸ Cue</button>
      </div>

      <div class="deck-sliders">
        <div class="slider-unit">
          <label>Volumen B <span id="txtVolB">100%</span></label>
          <input type="range" id="volB" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="slider-unit">
          <label>Pitch Tempo <span id="txtPitchB">0.0%</span></label>
          <input type="range" id="pitchB" min="-10" max="10" step="0.1" value="0">
        </div>
      </div>
    </div>

  </div>
</div>
<!-- Elementos de reproducción nativos en segundo plano -->
<audio id="audioA" loop crossorigin="anonymous"></audio>
<audio id="audioB" loop crossorigin="anonymous"></audio>

<script>
  const audA = document.getElementById('audioA');
  const audB = document.getElementById('audioB');
  
  let audioCtx = null;
  let srcA, srcB, gainA, gainB, crossGainA, crossGainB;
  let filterHi, filterMid, filterLow;
  let analyserA, analyserB;
  let engineReady = false;

  // Activación forzada de la tarjeta de sonido por evento del usuario
  function initAudioEngine() {
    if (engineReady) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      srcA = audioCtx.createMediaElementSource(audA);
      srcB = audioCtx.createMediaElementSource(audB);
      
      gainA = audioCtx.createGain(); gainB = audioCtx.createGain();
      crossGainA = audioCtx.createGain(); crossGainB = audioCtx.createGain();
      
      // Analizadores FFT rápidos para renderizado de ondas gráficas
      analyserA = audioCtx.createAnalyser(); analyserA.fftSize = 64;
      analyserB = audioCtx.createAnalyser(); analyserB.fftSize = 64;
      
      filterHi = audioCtx.createBiquadFilter();  filterHi.type = "highshelf";  filterHi.frequency.value = 4000;
      filterMid = audioCtx.createBiquadFilter(); filterMid.type = "peaking";    filterMid.frequency.value = 1200; filterMid.Q.value = 1.0;
      filterLow = audioCtx.createBiquadFilter(); filterLow.type = "lowshelf";   filterLow.frequency.value = 250;

      // Puentes de enrutamiento: Orígenes -> Volumen -> Crossfader -> Filtros -> Salida Máster
      srcA.connect(gainA).connect(crossGainA).connect(analyserA).connect(filterLow);
      srcB.connect(gainB).connect(crossGainB).connect(analyserB).connect(filterLow);
      
      filterLow.connect(filterMid).connect(filterHi).connect(audioCtx.destination);
      
      engineReady = true;
      renderWaves();
    } catch(e) { console.log("Permiso de hardware de audio denegado."); }
  }

  // Lectura e inyección de pistas de música locales
  document.getElementById('fileA').addEventListener('change', function(e) {
    if (this.files.length > 0) {
      document.getElementById('titleA').innerText = this.files[0].name;
      document.getElementById('labelFileA').innerText = "Cambiar canción";
      audA.src = URL.createObjectURL(this.files[0]); audA.load();
    }
  });

  document.getElementById('fileB').addEventListener('change', function(e) {
    if (this.files.length > 0) {
      document.getElementById('titleB').innerText = this.files[0].name;
      document.getElementById('labelFileB').innerText = "Cambiar canción";
      audB.src = URL.createObjectURL(this.files[0]); audB.load();
    }
  });

  // Gatillos Deck A
  document.getElementById('playA').addEventListener('click', () => {
    initAudioEngine(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    audA.play().then(() => { document.getElementById('wheelA').classList.add('spinning'); updateMixerMixes(); })
    .catch(() => alert("Por favor, selecciona primero una canción para el DECK A"));
  });
  document.getElementById('cueA').addEventListener('click', () => { audA.pause(); document.getElementById('wheelA').classList.remove('spinning'); });

  // Gatillos Deck B
  document.getElementById('playB').addEventListener('click', () => {
    initAudioEngine(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    audB.play().then(() => { document.getElementById('wheelB').classList.add('spinning'); updateMixerMixes(); })
    .catch(() => alert("Por favor, selecciona primero una canción para el DECK B"));
  });
  document.getElementById('cueB').addEventListener('click', () => { audB.pause(); document.getElementById('wheelB').classList.remove('spinning'); });

  // Cálculos matemáticos del Crossfader y volúmenes lineales
  function updateMixerMixes() {
    if (!engineReady) return;
    gainA.gain.value = parseFloat(document.getElementById('volA').value);
    gainB.gain.value = parseFloat(document.getElementById('volB').value);

    const crossVal = parseFloat(document.getElementById('crossfader').value);
    if (crossVal <= 0) { crossGainA.gain.value = 1; crossGainB.gain.value = 1 + crossVal; } 
    else { crossGainA.gain.value = 1 - crossVal; crossGainB.gain.value = 1; }
  }

  document.getElementById('volA').addEventListener('input', (e) => { document.getElementById('txtVolA').innerText = Math.round(e.target.value * 100) + "%"; updateMixerMixes(); });
  document.getElementById('volB').addEventListener('input', (e) => { document.getElementById('txtVolB').innerText = Math.round(e.target.value * 100) + "%"; updateMixerMixes(); });
  document.getElementById('crossfader').addEventListener('input', updateMixerMixes);

  // Manipuladores de Pitch (Tempo de pista / Sincronización de BPM)
  document.getElementById('pitchA').addEventListener('input', (e) => {
    const percent = parseFloat(e.target.value);
    document.getElementById('txtPitchA').innerText = (percent >= 0 ? "+" : "") + percent.toFixed(1) + "%";
    audA.playbackRate = 1 + (percent / 100);
  });
  document.getElementById('pitchB').addEventListener('input', (e) => {
    const percent = parseFloat(e.target.value);
    document.getElementById('txtPitchB').innerText = (percent >= 0 ? "+" : "") + percent.toFixed(1) + "%";
    audB.playbackRate = 1 + (percent / 100);
  });

  // Escuchadores del Ecualizador Isolator de 3 bandas
  document.getElementById('eqHi').addEventListener('input', (e) => { if (engineReady) filterHi.gain.value = e.target.value; });
  document.getElementById('eqMid').addEventListener('input', (e) => { if (engineReady) filterMid.gain.value = e.target.value; });
  document.getElementById('eqLow').addEventListener('input', (e) => { if (engineReady) filterLow.gain.value = e.target.value; });

  // CONTADOR DE SEGUNDOS DIGITAL (MINUTOS Y SEGUNDOS)
  function updateCounters() {
    const formatTime = (secs) => {
      if (isNaN(secs)) return "00:00";
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(Math.floor(secs % 60)).padStart(2, '0');
      return `${m}:${s}`;
    };
    document.getElementById('timeA').innerText = formatTime(audA.currentTime);
    document.getElementById('timeB').innerText = formatTime(audB.currentTime);
    requestAnimationFrame(updateCounters);
  }
  requestAnimationFrame(updateCounters);

  // RENDERIZADOR GRÁFICO DE LAS ONDAS DIGITALES (CANVAS LED)
  function renderWaves() {
    const canvasA = document.getElementById('canvasA'), ctxA = canvasA.getContext('2d');
    const canvasB = document.getElementById('canvasB'), ctxB = canvasB.getContext('2d');
    const bufferLengthA = analyserA.frequencyBinCount, dataArrayA = new Uint8Array(bufferLengthA);
    const bufferLengthB = analyserB.frequencyBinCount, dataArrayB = new Uint8Array(bufferLengthB);

    function draw() {
      requestAnimationFrame(draw);
      analyserA.getByteFrequencyData(dataArrayA);
      analyserB.getByteFrequencyData(dataArrayB);

      // Renderizado Deck A (Cyan)
      ctxA.fillStyle = '#000'; ctxA.fillRect(0, 0, canvasA.width, canvasA.height);
      let barWidth = (canvasA.width / bufferLengthA) * 1.5, barHeight, x = 0;
      for (let i = 0; i < bufferLengthA; i++) {
        barHeight = dataArrayA[i] / 4; ctxA.fillStyle = `hsl(185, 100%, ${Math.min(barHeight + 30, 70)}%)`;
        ctxA.fillRect(x, canvasA.height - barHeight, barWidth - 1, barHeight); x += barWidth;
      }

      // Renderizado Deck B (Magenta)
      ctxB.fillStyle = '#000'; ctxB.fillRect(0, 0, canvasB.width, canvasB.height);
      x = 0;
      for (let i = 0; i < bufferLengthB; i++) {
        barHeight = dataArrayB[i] / 4; ctxB.fillStyle = `hsl(330, 100%, ${Math.min(barHeight + 30, 70)}%)`;
        ctxB.fillRect(x, canvasB.height - barHeight, barWidth - 1, barHeight); x += barWidth;
      }
    }
    draw();
  }

  // SINTETIZADOR DE AUDIO MATEMÁTICO (SAMPLER FX)
  function playFX(type) {
    initAudioEngine();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode).connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'bocina') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now);
      gainNode.gain.setValueAtTime(0.3, now);
      for(let i = 0.1; i < 0.6; i += 0.15) {
        osc.frequency.setValueAtTime(380, now + i);
        gainNode.gain.setValueAtTime(0.25, now + i);
        osc.frequency.setValueAtTime(420, now + i + 0.05);
      }
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc.start(now); osc.stop(now + 0.8);
    } 
    else if (type === 'scratch') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.3);
      gainNode.gain.setValueAtTime(0.4, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.start(now); osc.stop(now + 0.35);
    } 
    else if (type === 'laser') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1800, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.5);
      gainNode.gain.setValueAtTime(0.2, now);
      gainNode.gain.linearRampToValueAtTime(0.001, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
        } 
    else if (type === 'sirena') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
      osc.frequency.linearRampToValueAtTime(900, now + 0.25);
      osc.frequency.linearRampToValueAtTime(600, now + 0.5);
      osc.frequency.linearRampToValueAtTime(900, now + 0.75);
      gainNode.gain.setValueAtTime(0.25, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
      osc.start(now); osc.stop(now + 1.0);
    }
  }

  // Enlaces de eventos para el Sampler FX central
  document.getElementById('fxBocina').addEventListener('click', () => playFX('bocina'));
  document.getElementById('fxScratch').addEventListener('click', () => playFX('scratch'));
  document.getElementById('fxLaser').addEventListener('click', () => playFX('laser'));
  document.getElementById('fxSirena').addEventListener('click', () => playFX('sirena'));
</script>
</body>
</html>
