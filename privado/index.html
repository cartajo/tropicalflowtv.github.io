<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pro DJ Mixer Live Studio</title>
<style>
  :root {
    --bg-main: #0a0b0d;
    --panel-bg: #14171c;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff007f;
    --neon-green: #39ff14;
    --text-main: #e2e8f0;
    --text-dim: #64748b;
    --gold: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  header {
    text-align: center;
    margin-bottom: 25px;
    width: 100%;
    max-width: 1200px;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
  }

  header p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 5px;
    letter-spacing: 1px;
  }

  .studio-container {
    width: 100%;
    max-width: 1200px;
    background: var(--panel-bg);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    padding: 25px;
  }

  /* Mixer Grid Principal */
  .mixer-interface {
    display: grid;
    grid-template-columns: 1fr 240px 1fr;
    gap: 20px;
  }

  @media (max-width: 900px) {
    .mixer-interface { grid-template-columns: 1fr; }
    .center-rack { order: 3; }
  }

  /* Estilos de los Decks (Platos) */
  .dj-deck {
    background: #1a1e24;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
  }

  .deck-a { border-bottom: 4px solid var(--neon-cyan); }
  .deck-b { border-bottom: 4px solid var(--neon-magenta); }

  .deck-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .deck-badge {
    font-size: 0.8rem;
    font-weight: 900;
    padding: 4px 10px;
    border-radius: 6px;
    background: #000;
  }
  .deck-a .deck-badge { color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.3); }
  .deck-b .deck-badge { color: var(--neon-magenta); border: 1px solid rgba(255,0,127,0.3); }

  .track-title {
    font-size: 0.85rem;
    color: var(--text-main);
    font-weight: 600;
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* File Input Estilizado */
  .file-uploader {
    width: 100%;
    margin-bottom: 15px;
  }
  .file-uploader input[type="file"] { display: none; }
  .file-label {
    display: block;
    text-align: center;
    padding: 10px;
    background: #242932;
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .file-label:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }

  /* El Plato Giratorio */
  .jog-wheel {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: radial-gradient(circle, #2d323f 12%, #11141a 13%, #11141a 35%, #181b22 36%, #050608 70%);
    border: 6px solid #282d37;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 15px #000;
    cursor: grab;
  }
  .jog-wheel:active { cursor: grabbing; }
  
  .jog-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 45px; height: 45px;
    border-radius: 50%;
    border: 3px solid #000;
    background: #14171c;
  }
  .deck-a .jog-center { box-shadow: 0 0 15px rgba(0,240,255,0.4); border-color: var(--neon-cyan); }
  .deck-b .jog-center { box-shadow: 0 0 15px rgba(255,0,127,0.4); border-color: var(--neon-magenta); }

  .jog-marker {
    position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 25px;
    background: #fff; border-radius: 2px;
    transform-origin: bottom center;
  }

  .spinning { animation: jogSpin 3s linear infinite; }
  @keyframes jogSpin { 100% { transform: rotate(360deg); } }

  /* Controles Inferiores del Deck */
  .deck-controls-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    gap: 10px;
  }

  .action-btn {
    flex: 1;
    padding: 12px;
    border: 0;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.85rem;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    background: #242932;
    color: var(--text-main);
  }
  .btn-play { background: #1e293b; color: var(--neon-green); border: 1px solid rgba(57,255,20,0.2); }
  .btn-play:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(57,255,20,0.4); }
  .btn-cue { background: #1e293b; color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
  .btn-cue:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(245,158,11,0.4); }

  /* Deslizadores del Deck (Pitch / Fader Lateral) */
  .deck-sliders {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 15px;
  }
</style>
</head>
<style>
  .slider-unit {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }

  .slider-unit label {
    font-size: 0.75rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    text-transform: uppercase;
  }

  .slider-unit input[type="range"] {
    width: 100%;
    height: 6px;
    background: #11141a;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .deck-a input[type="range"] { accent-color: var(--neon-cyan); }
  .deck-b input[type="range"] { accent-color: var(--neon-magenta); }

  /* Rack del Mezclador Central */
  .center-rack {
    background: #111317;
    border-radius: 16px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.02);
    box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
  }

  .mixer-brand {
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 15px;
    text-align: center;
    text-transform: uppercase;
  }

  .eq-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 10px 0;
  }

  .knob-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }

  .knob-unit label {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .knob-unit input[type="range"] {
    width: 85%;
    accent-color: var(--gold);
    cursor: pointer;
  }

  .crossfader-section {
    width: 100%;
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
    text-align: center;
  }

  .crossfader-section label {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-weight: 800;
    letter-spacing: 1.5px;
    display: block;
    margin-bottom: 6px;
  }

  .crossfader-slider {
    width: 100%;
    height: 8px;
    background: #000;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    accent-color: var(--gold);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .fader-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <h1>Pro DJ Mixer</h1>
  <p>Live Mixing Studio — Virtual Core Engine</p>
</header>

<div class="studio-container">
  <div class="mixer-interface">
    
    <!-- DECK A -->
    <div class="dj-deck deck-a">
      <div class="deck-header">
        <span class="deck-badge">DECK A</span>
        <div class="track-title" id="titleA">No Track Loaded</div>
      </div>
      
      <div class="file-uploader">
        <label for="fileA" class="file-label" id="labelFileA">Cargar canción</label>
        <input type="file" id="fileA" accept="audio/*">
      </div>

      <div class="jog-wheel" id="wheelA">
        <div class="jog-center"></div>
        <div class="jog-marker" id="markA"></div>
      </div>

      <div class="deck-controls-row">
        <button class="action-btn btn-play" id="playA">▶ Play</button>
        <button class="action-btn btn-cue" id="cueA">⏸ Cue</button>
      </div>

      <div class="deck-sliders">
        <div class="slider-unit">
          <label>Volumen <span id="txtVolA">100%</span></label>
          <input type="range" id="volA" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="slider-unit">
          <label>Pitch Tempo <span id="txtPitchA">0.0%</span></label>
          <input type="range" id="pitchA" min="-10" max="10" step="0.1" value="0">
        </div>
      </div>
    </div>

    <!-- CENTRAL MIXER RACK -->
    <div class="center-rack">
      <div class="mixer-brand">Master Control</div>
      
      <div class="eq-section">
        <div class="knob-unit">
          <label>HI (Agudos)</label>
          <input type="range" id="eqHi" min="-24" max="12" step="1" value="0">
        </div>
        <div class="knob-unit">
          <label>MID (Medios)</label>
          <input type="range" id="eqMid" min="-24" max="12" step="1" value="0">
        </div>
        <div class="knob-unit">
          <label>LOW (Graves)</label>
          <input type="range" id="eqLow" min="-24" max="12" step="1" value="0">
        </div>
      </div>

      <div class="crossfader-section">
        <label>Crossfader</label>
        <input type="range" id="crossfader" class="crossfader-slider" min="-1" max="1" step="0.02" value="0">
        <div class="fader-labels">
          <span>CH A</span>
          <span>CENTER</span>
          <span>CH B</span>
        </div>
      </div>
    </div>

    <!-- DECK B -->
    <div class="dj-deck deck-b">
      <div class="deck-header">
        <span class="deck-badge">DECK B</span>
        <div class="track-title" id="titleB">No Track Loaded</div>
      </div>
      
      <div class="file-uploader">
        <label for="fileB" class="file-label" id="labelFileB">Cargar canción</label>
        <input type="file" id="fileB" accept="audio/*">
      </div>

      <div class="jog-wheel" id="wheelB">
        <div class="jog-center"></div>
        <div class="jog-marker" id="markB"></div>
      </div>

      <div class="deck-controls-row">
        <button class="action-btn btn-play" id="playB">▶ Play</button>
        <button class="action-btn btn-cue" id="cueB">⏸ Cue</button>
      </div>

      <div class="deck-sliders">
        <div class="slider-unit">
          <label>Volumen <span id="txtVolB">100%</span></label>
          <input type="range" id="volB" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="slider-unit">
          <label>Pitch Tempo <span id="txtPitchB">0.0%</span></label>
          <input type="range" id="pitchB" min="-10" max="10" step="0.1" value="0">
        </div>
      </div>
    </div>

  </div>
</div>
<!-- Elementos de Audio Nativos Ocultos -->
<audio id="audioA" loop crossorigin="anonymous"></audio>
<audio id="audioB" loop crossorigin="anonymous"></audio>

<script>
  // Obtención de elementos de audio
  const audA = document.getElementById('audioA');
  const audB = document.getElementById('audioB');
  
  // Variables del Motor Web Audio API
  let audioCtx = null;
  let srcA, srcB, gainA, gainB, crossGainA, crossGainB;
  let filterHi, filterMid, filterLow;
  let engineReady = false;

  // Inicialización Segura del Entorno de Audio Profesional
  function initAudioEngine() {
    if (engineReady) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Nodos de origen multimedia
      srcA = audioCtx.createMediaElementSource(audA);
      srcB = audioCtx.createMediaElementSource(audB);
      
      // Nodos de volumen independiente por canal
      gainA = audioCtx.createGain();
      gainB = audioCtx.createGain();
      
      // Nodos de volumen asignados al Crossfader central
      crossGainA = audioCtx.createGain();
      crossGainB = audioCtx.createGain();
      
      // Filtros del Ecualizador Isolator (3 bandas)
      filterHi = audioCtx.createBiquadFilter();  filterHi.type = "highshelf";  filterHi.frequency.value = 4000;
      filterMid = audioCtx.createBiquadFilter(); filterMid.type = "peaking";    filterMid.frequency.value = 1200; filterMid.Q.value = 1.0;
      filterLow = audioCtx.createBiquadFilter(); filterLow.type = "lowshelf";   filterLow.frequency.value = 250;

      // Enrutamiento físico: Fuentes -> Volumen -> Crossfader -> Ecualizador -> Bocinas
      srcA.connect(gainA).connect(crossGainA).connect(filterLow);
      srcB.connect(gainB).connect(crossGainB).connect(filterLow);
      
      filterLow.connect(filterMid).connect(filterHi).connect(audioCtx.destination);
      
      engineReady = true;
    } catch(e) {
      console.log("Esperando acción del usuario para activar hardware de audio.");
    }
  }

  // Carga Dinámica de Archivos MP3/WAV (Deck A)
  document.getElementById('fileA').addEventListener('change', function(e) {
    if (this.files.length > 0) {
      const file = this.files[0];
      document.getElementById('titleA').innerText = file.name;
      document.getElementById('labelFileA').innerText = "Cambiar canción";
      audA.src = URL.createObjectURL(file);
      audA.load();
    }
  });

  // Carga Dinámica de Archivos MP3/WAV (Deck B)
  document.getElementById('fileB').addEventListener('change', function(e) {
    if (this.files.length > 0) {
      const file = this.files[0];
      document.getElementById('titleB').innerText = file.name;
      document.getElementById('labelFileB').innerText = "Cambiar canción";
      audB.src = URL.createObjectURL(file);
      audB.load();
    }
  });

  // Disparadores de Reproducción Deck A
  document.getElementById('playA').addEventListener('click', () => {
    initAudioEngine();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    
    audA.play().then(() => {
      document.getElementById('wheelA').classList.add('spinning');
      updateMixerMixes();
    }).catch(() => alert("Por favor, carga un archivo de música en el DECK A primero."));
  });

  document.getElementById('cueA').addEventListener('click', () => {
    audA.pause();
    document.getElementById('wheelA').classList.remove('spinning');
  });

  // Disparadores de Reproducción Deck B
  document.getElementById('playB').addEventListener('click', () => {
    initAudioEngine();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    
    audB.play().then(() => {
      document.getElementById('wheelB').classList.add('spinning');
      updateMixerMixes();
    }).catch(() => alert("Por favor, carga un archivo de música en el DECK B primero."));
  });

  document.getElementById('cueB').addEventListener('click', () => {
    audB.pause();
    document.getElementById('wheelB').classList.remove('spinning');
  });

  // Cálculo de Atenuación de Canales y Crossfader Pro DJ
  function updateMixerMixes() {
    if (!engineReady) return;
    
    const vA = parseFloat(document.getElementById('volA').value);
    const vB = parseFloat(document.getElementById('volB').value);
    gainA.gain.value = vA;
    gainB.gain.value = vB;

    const crossVal = parseFloat(document.getElementById('crossfader').value);
    // Algoritmo de corte lineal limpio
    if (crossVal <= 0) {
      crossGainA.gain.value = 1;
      crossGainB.gain.value = 1 + crossVal; // Incrementa el volumen del canal B al centrarse
    } else {
      crossGainA.gain.value = 1 - crossVal; // Atenúa el canal A al moverse a la derecha
      crossGainB.gain.value = 1;
    }
  }

  // Escuchadores de Eventos Faders de Volumen y Crossfader
  document.getElementById('volA').addEventListener('input', (e) => {
    document.getElementById('txtVolA').innerText = Math.round(e.target.value * 100) + "%";
    updateMixerMixes();
  });

  document.getElementById('volB').addEventListener('input', (e) => {
    document.getElementById('txtVolB').innerText = Math.round(e.target.value * 100) + "%";
    updateMixerMixes();
  });

  document.getElementById('crossfader').addEventListener('input', updateMixerMixes);

  // Manipulación del Pitch (BPM / Velocidad) en Tiempo Real
  document.getElementById('pitchA').addEventListener('input', (e) => {
    const percent = parseFloat(e.target.value);
    document.getElementById('txtPitchA').innerText = (percent >= 0 ? "+" : "") + percent.toFixed(1) + "%";
    // Convierte el porcentaje de pitch a factor multiplicador de velocidad
    audA.playbackRate = 1 + (percent / 100);
  });

  document.getElementById('pitchB').addEventListener('input', (e) => {
    const percent = parseFloat(e.target.value);
    document.getElementById('txtPitchB').innerText = (percent >= 0 ? "+" : "") + percent.toFixed(1) + "%";
    audB.playbackRate = 1 + (percent / 100);
  });

  // Enrutamiento Dinámico del Rack de Ecualización Maestro
  document.getElementById('eqHi').addEventListener('input', (e) => { if (engineReady) filterHi.gain.value = e.target.value; });
  document.getElementById('eqMid').addEventListener('input', (e) => { if (engineReady) filterMid.gain.value = e.target.value; });
  document.getElementById('eqLow').addEventListener('input', (e) => { if (engineReady) filterLow.gain.value = e.target.value; });
</script>
</body>
</html>
